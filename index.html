<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M6 Farmakoloji Sınav Analizi</title>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--text:#1a202c;--sub:#4a5568;--border:#e2e8f0;
  --accent:#4f46e5;--accent2:#7c3aed;--green:#16a34a;--orange:#ea580c;
  --tag-bg:#ede9fe;--tag-text:#6d28d9;--shadow:0 2px 8px rgba(0,0,0,.08);
  --header:#4f46e5;--header-text:#fff;
}
.dark{
  --bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--sub:#94a3b8;--border:#334155;
  --accent:#818cf8;--accent2:#a78bfa;--green:#4ade80;--orange:#fb923c;
  --tag-bg:#312e81;--tag-text:#a5b4fc;--shadow:0 2px 8px rgba(0,0,0,.4);
  --header:#312e81;--header-text:#c7d2fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
a{color:var(--accent);}

/* HEADER */
.site-header{background:var(--header);color:var(--header-text);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.site-header h1{font-size:1.25rem;font-weight:700;letter-spacing:-.5px;}
.site-header h1 span{font-weight:300;opacity:.75;}
.theme-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:var(--header-text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:background .2s;}
.theme-btn:hover{background:rgba(255,255,255,.25);}

/* STATS BAR */
.stats-bar{display:flex;gap:16px;flex-wrap:wrap;padding:20px 24px;background:var(--card);border-bottom:1px solid var(--border);}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 20px;min-width:120px;text-align:center;}
.stat-card .num{font-size:1.8rem;font-weight:800;color:var(--accent);}
.stat-card .lbl{font-size:.7rem;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

/* CONTROLS */
.controls{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:90;box-shadow:var(--shadow);}
.search-box{flex:1;min-width:200px;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9rem;outline:none;}
.search-box:focus{border-color:var(--accent);}
.sort-group{display:flex;gap:6px;flex-wrap:wrap;}
.sort-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--sub);font-size:.8rem;cursor:pointer;transition:all .2s;}
.sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--sub);font-size:.75rem;cursor:pointer;transition:all .2s;}
.filter-chip.active{background:var(--tag-bg);color:var(--tag-text);border-color:var(--accent2);}
#result-count{color:var(--sub);font-size:.8rem;margin-left:auto;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:24px;}

/* CARD */
.drug-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;}
.drug-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.drug-card.open{border-color:var(--accent);}
.card-head{padding:14px 16px;}
.card-name{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.rank-badge{background:var(--accent);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700;}
.card-counts{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.count-item{display:flex;align-items:center;gap:4px;font-size:.8rem;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dot-green{background:var(--green);}
.dot-orange{background:var(--orange);}
.count-label{color:var(--sub);}
.count-val{font-weight:700;}
.bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
.bar-inner{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s;}
.bar-correct{background:linear-gradient(90deg,var(--green),#15803d);}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:.68rem;padding:2px 8px;border-radius:10px;background:var(--tag-bg);color:var(--tag-text);}

/* DETAIL */
.card-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
.drug-card.open .card-detail{display:block;}
.detail-section{margin-top:14px;}
.detail-section h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--sub);margin-bottom:6px;}
.mechanism-text{font-size:.85rem;line-height:1.6;color:var(--text);}
.list-items{list-style:none;display:flex;flex-direction:column;gap:4px;}
.list-items li{font-size:.82rem;padding:4px 8px;border-radius:6px;background:var(--bg);color:var(--text);position:relative;padding-left:18px;}
.list-items li::before{content:'•';position:absolute;left:6px;color:var(--accent);}
.list-items.danger li::before{color:#dc2626;}
.list-items.success li::before{color:var(--green);}
.pk-text{font-size:.82rem;color:var(--sub);font-style:italic;background:var(--bg);padding:8px;border-radius:6px;line-height:1.5;}
.note-item{background:linear-gradient(135deg,#fef3c7,#fde68a10);border-left:3px solid #f59e0b;padding:6px 10px;border-radius:0 6px 6px 0;font-size:.8rem;margin-bottom:5px;color:var(--text);}
.dark .note-item{background:linear-gradient(135deg,#451a03,#78350f20);}

/* QUESTION EXAMPLES */
.q-item{margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.q-header{padding:8px 12px;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:8px;}
.q-header.correct{background:linear-gradient(90deg,#dcfce7,#bbf7d020);color:#15803d;}
.q-header.wrong{background:linear-gradient(90deg,#fee2e2,#fecaca20);color:#b91c1c;}
.dark .q-header.correct{background:linear-gradient(90deg,#14532d,#166534);color:#86efac;}
.dark .q-header.wrong{background:linear-gradient(90deg,#7f1d1d,#991b1b);color:#fca5a5;}
.q-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;flex-shrink:0;}
.q-badge.correct{background:#16a34a;color:#fff;}
.q-badge.wrong{background:#dc2626;color:#fff;}
.q-body{padding:8px 12px;font-size:.78rem;color:var(--sub);line-height:1.5;}

/* NO RESULTS */
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--sub);}
.no-results svg{width:60px;height:60px;opacity:.3;margin-bottom:12px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* VCS PANEL */
.vcs-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:var(--header-text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:background .2s;display:flex;align-items:center;gap:6px;}
.vcs-btn:hover{background:rgba(255,255,255,.25);}
.vcs-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;backdrop-filter:blur(2px);}
.vcs-overlay.open{display:block;}
.vcs-panel{position:fixed;top:0;right:-440px;width:420px;max-width:100vw;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transition:right .3s ease;box-shadow:-4px 0 24px rgba(0,0,0,.15);}
.vcs-panel.open{right:0;}
.vcs-panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--header);color:var(--header-text);}
.vcs-panel-head h2{font-size:1rem;font-weight:700;}
.vcs-close{background:none;border:none;color:var(--header-text);font-size:1.5rem;cursor:pointer;padding:0 4px;line-height:1;}
.vcs-commit-area{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg);}
.vcs-commit-area label{font-size:.75rem;font-weight:600;color:var(--sub);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.vcs-msg-row{display:flex;gap:8px;}
.vcs-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:.85rem;outline:none;}
.vcs-input:focus{border-color:var(--accent);}
.vcs-save-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;white-space:nowrap;transition:opacity .2s;}
.vcs-save-btn:hover{opacity:.85;}
.vcs-list{flex:1;overflow-y:auto;padding:12px;}
.vcs-empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:.85rem;line-height:1.7;}
.vcs-item{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--bg);transition:border-color .2s;}
.vcs-item:hover{border-color:var(--accent);}
.vcs-item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.vcs-item-msg{font-size:.85rem;font-weight:600;color:var(--text);}
.vcs-item-date{font-size:.7rem;color:var(--sub);white-space:nowrap;}
.vcs-item-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.vcs-meta-tag{font-size:.65rem;padding:2px 8px;border-radius:10px;background:var(--tag-bg);color:var(--tag-text);}
.vcs-item-actions{display:flex;gap:6px;}
.vcs-restore-btn{padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.75rem;cursor:pointer;transition:opacity .2s;}
.vcs-restore-btn:hover{opacity:.85;}
.vcs-del-btn{padding:4px 10px;background:var(--border);color:var(--sub);border:none;border-radius:6px;font-size:.75rem;cursor:pointer;transition:background .2s;}
.vcs-del-btn:hover{background:#fee2e2;color:#b91c1c;}
.vcs-hash{font-family:monospace;font-size:.65rem;color:var(--sub);opacity:.5;}
.vcs-current-state{padding:10px 14px;background:linear-gradient(135deg,var(--tag-bg),transparent);border-radius:8px;margin-bottom:12px;font-size:.78rem;color:var(--tag-text);}
.vcs-current-state strong{display:block;margin-bottom:4px;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;}
/* STAR */
.star-btn{background:none;border:none;cursor:pointer;font-size:.95rem;padding:0 2px;opacity:.3;transition:opacity .2s,transform .2s;line-height:1;flex-shrink:0;}
.star-btn:hover{opacity:.7;}
.star-btn.starred{opacity:1;transform:scale(1.1);}
.starred-bar{display:none;padding:8px 24px;background:linear-gradient(90deg,#fef9c3,#fef3c740);border-bottom:1px solid var(--border);align-items:center;gap:8px;font-size:.8rem;color:#92400e;}
.dark .starred-bar{background:linear-gradient(90deg,#451a03,#78350f20);color:#fbbf24;}
.starred-bar.visible{display:flex;}
.starred-clear{margin-left:auto;padding:3px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--sub);font-size:.72rem;cursor:pointer;}

/* ── MOBILE ─────────────────────────────────────────────────── */
@media (max-width:768px){
  /* header */
  .site-header{padding:10px 14px;gap:6px;}
  .site-header h1{font-size:.95rem;}
  .vcs-btn{padding:5px 10px;font-size:.75rem;}
  .theme-btn{padding:5px 10px;font-size:.75rem;}

  /* stats: yatay kaydırma */
  .stats-bar{padding:10px 14px;gap:8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .stats-bar::-webkit-scrollbar{display:none;}
  .stat-card{min-width:80px;padding:8px 10px;flex-shrink:0;}
  .stat-card .num{font-size:1.3rem;}

  /* controls */
  .controls{padding:8px 14px;gap:8px;}
  .search-box{min-width:unset;width:100%;font-size:1rem;} /* 1rem → iOS zoom yok */
  .sort-group{overflow-x:auto;flex-wrap:nowrap;width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px;}
  .sort-group::-webkit-scrollbar{display:none;}
  .sort-btn{white-space:nowrap;padding:6px 10px;font-size:.75rem;}
  .filter-row{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .filter-row::-webkit-scrollbar{display:none;}
  .filter-chip{white-space:nowrap;font-size:.72rem;padding:4px 10px;}
  #result-count{display:none;}

  /* grid: tek sütun */
  .grid{grid-template-columns:1fr;padding:10px;gap:8px;}

  /* cards: hover kaldır, padding azalt */
  .drug-card:hover{transform:none;box-shadow:var(--shadow);}
  .card-head{padding:12px 14px;}
  .card-detail{padding:0 14px 14px;}
  .card-name{font-size:.92rem;}
  .mechanism-text{font-size:.82rem;}
  .list-items li{font-size:.78rem;}
  .pk-text{font-size:.78rem;}

  /* starred bar */
  .starred-bar{padding:6px 14px;}

  /* vcs panel: tam genişlik */
  .vcs-panel{width:100vw;right:-100vw;border-radius:0;}
  .vcs-panel.open{right:0;}
  .vcs-commit-area{padding:12px 16px;}
  .vcs-list{padding:8px;}
}

@media (max-width:400px){
  .site-header h1{font-size:.85rem;}
  .vcs-btn span{display:none;} /* sadece emoji göster */
}

/* ── SORU TARZI ─────────────────────────────────────────────── */
.qstyle-summary{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.qstyle-badge{font-size:.63rem;padding:2px 8px;border-radius:10px;font-weight:700;}
.qn-list{display:flex;flex-direction:column;gap:5px;}
.qn-card{border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.qn-head{padding:4px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.qn-tag{font-size:.67rem;font-weight:700;white-space:nowrap;}
.qn-hint{font-size:.63rem;color:var(--sub);font-style:italic;text-align:right;}
.qn-text{padding:6px 10px 7px;font-size:.8rem;font-weight:600;color:var(--text);border-left:3px solid transparent;}
/* trap */
.qn-trap .qn-head{background:#fee2e2;}.qn-trap .qn-tag{color:#b91c1c;}.qn-trap .qn-text{border-color:#dc2626;background:#fff5f5;}
.dark .qn-trap .qn-head{background:#7f1d1d;}.dark .qn-trap .qn-text{background:#450a0a;}
.qstyle-badge.qn-trap{background:#fee2e2;color:#b91c1c;}
/* only */
.qn-only .qn-head{background:#fce7f3;}.qn-only .qn-tag{color:#be185d;}.qn-only .qn-text{border-color:#be185d;background:#fdf2f8;}
.dark .qn-only .qn-head{background:#500724;}.dark .qn-only .qn-text{background:#2d0a2e;}
.qstyle-badge.qn-only{background:#fce7f3;color:#be185d;}
/* antidot */
.qn-antidot .qn-head{background:#fef3c7;}.qn-antidot .qn-tag{color:#92400e;}.qn-antidot .qn-text{border-color:#f59e0b;background:#fffbeb;}
.dark .qn-antidot .qn-head{background:#78350f;}.dark .qn-antidot .qn-text{background:#451a03;}
.qstyle-badge.qn-antidot{background:#fef3c7;color:#92400e;}
/* pk */
.qn-pk .qn-head{background:#dbeafe;}.qn-pk .qn-tag{color:#1d4ed8;}.qn-pk .qn-text{border-color:#3b82f6;background:#eff6ff;}
.dark .qn-pk .qn-head{background:#1e3a5f;}.dark .qn-pk .qn-text{background:#172554;}
.qstyle-badge.qn-pk{background:#dbeafe;color:#1d4ed8;}
/* combo */
.qn-combo .qn-head{background:#e0f2fe;}.qn-combo .qn-tag{color:#0369a1;}.qn-combo .qn-text{border-color:#0ea5e9;background:#f0f9ff;}
.dark .qn-combo .qn-head{background:#0c4a6e;}.dark .qn-combo .qn-text{background:#082f49;}
.qstyle-badge.qn-combo{background:#e0f2fe;color:#0369a1;}
/* mech */
.qn-mech .qn-head{background:#ede9fe;}.qn-mech .qn-tag{color:#6d28d9;}.qn-mech .qn-text{border-color:#7c3aed;background:#faf5ff;}
.dark .qn-mech .qn-head{background:#4c1d95;}.dark .qn-mech .qn-text{background:#2e1065;}
.qstyle-badge.qn-mech{background:#ede9fe;color:#6d28d9;}
/* side */
.qn-side .qn-head{background:#fef9c3;}.qn-side .qn-tag{color:#a16207;}.qn-side .qn-text{border-color:#eab308;background:#fefce8;}
.dark .qn-side .qn-head{background:#713f12;}.dark .qn-side .qn-text{background:#422006;}
.qstyle-badge.qn-side{background:#fef9c3;color:#a16207;}
/* key */
.qn-key .qn-head{background:var(--tag-bg);}.qn-key .qn-tag{color:var(--tag-text);}.qn-key .qn-text{border-color:var(--accent);background:var(--bg);}
.qstyle-badge.qn-key{background:var(--tag-bg);color:var(--tag-text);}
/* actual questions */
.qn-actual-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.qn-actual{border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.qn-actual-head{padding:4px 10px;display:flex;align-items:center;gap:8px;}
.qn-actual-role{font-size:.67rem;font-weight:700;}
.qn-actual-ref{font-size:.63rem;font-family:monospace;background:rgba(0,0,0,.1);padding:1px 7px;border-radius:6px;margin-left:auto;}
.qn-actual-q{padding:6px 10px;font-size:.8rem;font-weight:600;color:var(--text);border-left:3px solid transparent;}
.qn-actual-info{padding:2px 10px 8px;font-size:.75rem;color:var(--sub);}
.qn-actual-correct .qn-actual-head{background:#dcfce7;}.qn-actual-correct .qn-actual-role{color:#15803d;}.qn-actual-correct .qn-actual-q{border-color:#16a34a;background:#f0fdf4;}
.dark .qn-actual-correct .qn-actual-head{background:#14532d;}.dark .qn-actual-correct .qn-actual-q{background:#052e16;}
.qn-actual-wrong .qn-actual-head{background:#fee2e2;}.qn-actual-wrong .qn-actual-role{color:#b91c1c;}.qn-actual-wrong .qn-actual-q{border-color:#dc2626;background:#fff5f5;}
.dark .qn-actual-wrong .qn-actual-head{background:#7f1d1d;}.dark .qn-actual-wrong .qn-actual-q{background:#450a0a;}

/* ── GRUP GÖRÜNÜMÜ ───────────────────────────────────────────── */
.sort-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;align-self:center;margin:0 2px;}
.grid.grouped-view{display:block;padding:16px 24px;}
.group-section{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);margin-bottom:12px;}
.group-header{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s;}
.group-header:hover{background:var(--bg);}
.group-icon{font-size:1.6rem;flex-shrink:0;line-height:1;}
.group-info-txt{display:flex;flex-direction:column;gap:2px;min-width:0;}
.group-name{font-size:.95rem;font-weight:700;color:var(--text);}
.group-desc{font-size:.72rem;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-badges{display:flex;gap:6px;align-items:center;margin-left:auto;flex-shrink:0;}
.group-count-badge{background:var(--accent);color:#fff;font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:700;}
.group-freq-badge{background:var(--bg);border:1px solid var(--border);color:var(--sub);font-size:.68rem;padding:2px 8px;border-radius:10px;}
.group-chev{color:var(--sub);font-size:1rem;flex-shrink:0;margin-left:6px;transition:transform .2s;}
.group-section.collapsed .group-chev{transform:rotate(-90deg);}
.group-body{border-top:1px solid var(--border);}
.group-section.collapsed .group-body{display:none;}
.group-inner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:12px;}
@media(max-width:768px){
  .grid.grouped-view{padding:10px;}
  .group-header{padding:12px 14px;gap:8px;}
  .group-icon{font-size:1.3rem;}
  .group-desc{display:none;}
  .group-inner-grid{grid-template-columns:1fr;gap:8px;padding:8px;}
}
</style>
</head>
<body>

<header class="site-header">
  <h1>M6 Farmakoloji <span>Sınav Analizi</span></h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="vcs-btn" onclick="openVCS()">📋 Geçmiş</button>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Koyu Tema</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <input type="text" class="search-box" id="searchInput" placeholder="İlaç ara... (örn. valproik, L-DOPA, karbamazepin)">

// Stats
function renderStats(){
  const bar = document.getElementById('statsBar');
  const total = DRUGS.length;
  const withAnswer = DRUGS.filter(d=>d.dogru_cevap_sayisi>0).length;
  const top3 = DRUGS.slice(0,3).map(d=>d.isim).join(', ');
  const totalQ = new Set();
  // approximate
  bar.innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Toplam İlaç</div></div>
    <div class="stat-card"><div class="num">${withAnswer}</div><div class="lbl">Doğru Cevap Olan</div></div>
    <div class="stat-card"><div class="num">${DRUGS.filter(d=>d.toplam>=4).length}</div><div class="lbl">Yüksek Frekans (≥4)</div></div>
    <div class="stat-card"><div class="num">${DRUGS.filter(d=>d.toplam===1).length}</div><div class="lbl">Bir Kez Çıkan</div></div>
    <div class="stat-card" style="min-width:260px"><div class="num" style="font-size:1rem;line-height:1.4">${top3}</div><div class="lbl">En Çok Çıkan İlk 3</div></div>
  `;
}

function getSorted(list){
  return [...list].sort((a,b)=>{
    if(sortMode==='toplam') return b.toplam-a.toplam||b.dogru_cevap_sayisi-a.dogru_cevap_sayisi;
    if(sortMode==='dogru') return b.dogru_cevap_sayisi-a.dogru_cevap_sayisi||b.toplam-a.toplam;
    if(sortMode==='sik') return b.sik_sayisi-a.sik_sayisi;
    if(sortMode==='az') return a.toplam-b.toplam;
    return 0;
  });
}

  else if(filterMode==='hic') list=list.filter(d=>d.dogru_cevap_sayisi===0);
  else if(filterMode==='yildiz') list=list.filter(d=>starredDrugs.has(d.isim));
  if(searchTerm){
    const s=searchTerm.toLowerCase();
    list=list.filter(d=>
      d.isim.toLowerCase().includes(s)||
      (d.ozellikler.mekanizma||'').toLowerCase().includes(s)||
      (d.ozellikler.endikasyon||[]).some(e=>e.toLowerCase().includes(s))||
      (d.ozellikler.onemli_notlar||[]).some(n=>n.toLowerCase().includes(s))
    );
  }
  return getSorted(list);
}

function pct(n,total){ return total===0?0:Math.round(n/total*100); }

function getGroupTag(d){
  const m=(d.ozellikler.mekanizma||'').toLowerCase();
  const e=(d.ozellikler.endikasyon||[]).join(' ').toLowerCase();
  const n=d.isim.toLowerCase();
  if(m.includes('antiepileptik')||e.includes('epilepsi')||e.includes('nöbet')) return 'Antiepileptik';
  if(m.includes('parkinson')||e.includes('parkinson')) return 'Antiparkinson';
  if(m.includes('ssri')||m.includes('antidepresan')||e.includes('depresyon')) return 'Antidepresan';
  if(m.includes('antipsikotik')||e.includes('şizofreni')) return 'Antipsikotik';
  if(m.includes('nsai')||m.includes('cox')||e.includes('ağrı')&&!m.includes('opioid')) return 'NSAİİ';
  if(m.includes('opioid')||e.includes('opioid')) return 'Opioid';
  if(m.includes('migren')||e.includes('migren')) return 'Migren';
  if(m.includes('kas gevşetici')||m.includes('spastisite')||m.includes('nöromüsküler')) return 'Kas Gevşetici';
  if(m.includes('anestezi')||m.includes('anestezik')) return 'Anestezik';
  if(m.includes('gaba-a')||m.includes('benzodiazepin')||m.includes('barbitürat')) return 'Sedatif/Hipnotik';
  return 'Diğer';
}

function classifyNote(n){
  const u = n.toUpperCase();
  if(/DEĞİL|YOKTUR|OLMAZ|GÖSTERMEZ|ETKISIZ|ETKİSİ YOK|YAPMAZ|GEÇEMEZa/.test(u)||
     /\bYOK\b/.test(u)||u.endsWith(' DEĞİL')||u.includes('DEĞİLDİR'))
    return {icon:'❌',label:'Tuzak',cls:'qn-trap',hint:'Hangisi YANLIŞ/DOĞRU? sorusu'};
  if(/SADECE|YALNIZCA|\bTEK\b|MÜNHASIR|SPESİFİK/.test(u))
    return {icon:'🎯',label:'Seçici',cls:'qn-only',hint:'Hangi durumda kullanılır?'};
  if(/ANTİDOT|N-ASETİL|ZEHİRLENME|OVERDOZ|ANTAGO.*ZEHİR/.test(u))
    return {icon:'🚨',label:'Antidot',cls:'qn-antidot',hint:'Zehirlenme/overdoz sorusu'};
  if(/\bIV\b|PARENTERAL|KBB GEÇ|ORAL.*BIYO|YARILANMA|EMILIM|İLK GEÇİŞ|ABSORB/.test(u))
    return {icon:'💉',label:'FK / Uygulama',cls:'qn-pk',hint:'Farmakokinetik veya uygulama yolu sorusu'};
  if(/KOMBİNE|BIRLIKTE KULLAN|ARTIR|\bKAT\b|SİNERJİ|ETKİLEŞ|AZALT/.test(u))
    return {icon:'🔗',label:'Kombinasyon',cls:'qn-combo',hint:'İlaç kombinasyonu / etkileşim sorusu'};
  if(/MEKANİZMA|İNHİBİTÖR|BLOKÖR|AGONIST|ANTAGONİST|RESEPTÖR|KANAL|TRANSPORTER|ENZIM/.test(u))
    return {icon:'⚙️',label:'Mekanizma',cls:'qn-mech',hint:'Etki mekanizması sorusu'};
  if(/TOKSİK|HASAR|YAN ETKİ|HEPATOTOKSİ|NEFRO|KEMİK|AGRANÜLOSİTOZ|APLAZ/.test(u))
    return {icon:'⚠️',label:'Yan Etki',cls:'qn-side',hint:'Yan etki / toksisite sorusu'};
  return {icon:'⭐',label:'Anahtar',cls:'qn-key',hint:'Sınav için kritik bilgi'};
}

function renderQStyle(d){
  const notes = d.ozellikler.onemli_notlar || [];
  const qs    = d.soru_ornekleri || [];
  if(notes.length===0 && qs.length===0) return '';

  const cats = notes.map(n=>({note:n,...classifyNote(n)}));

  // Özet badge'ler (her tipten kaç tane)
  const counts = {};
  cats.forEach(c=>{ counts[c.label]=(counts[c.label]||{count:0,cls:c.cls,icon:c.icon}); counts[c.label].count++; });
  const summaryHtml = Object.values(counts).map(t=>
    `<span class="qstyle-badge ${t.cls}">${t.icon} ${t.label}${t.count>1?' ×'+t.count:''}</span>`
  ).join('');

  const noteCards = cats.map(c=>`
    <div class="qn-card ${c.cls}">
      <div class="qn-head"><span class="qn-tag">${c.icon} ${c.label}</span><span class="qn-hint">${c.hint}</span></div>
      <div class="qn-text">${esc(c.note)}</div>
    </div>`).join('');

  const actualCards = qs.map(q=>{
    const ref  = (q.soru_ozeti.match(/^(H\d-\d+)/)||['',''])[1];
    const qTxt = q.soru_ozeti.replace(/^H\d-\d+:\s*/,'');
    const cls  = q.dogru_cevap_miydi ? 'qn-actual-correct' : 'qn-actual-wrong';
    const role = q.dogru_cevap_miydi ? '✓ Doğru Cevap Olarak' : '✗ Yanlış Şık Olarak';
    return `<div class="qn-actual ${cls}">
      <div class="qn-actual-head">
        <span class="qn-actual-role">${role}</span>
        ${ref?`<span class="qn-actual-ref">${ref}</span>`:''}
      </div>
      <div class="qn-actual-q">❓ ${esc(qTxt)}</div>
      <div class="qn-actual-info">💬 ${esc(q.sik_bilgisi)}</div>
    </div>`;
  }).join('');

  return `<div class="detail-section">
    <h3>🎯 TUS'ta Nasıl Sorulur?</h3>
    <div class="qstyle-summary">${summaryHtml}</div>
    <div class="qn-list">${noteCards}</div>
    ${actualCards?'<div class="qn-actual-list">'+actualCards+'</div>':''}
  </div>`;
}

function makeList(items, cls=''){
  if(!items||items.length===0) return '<span style="color:var(--sub);font-size:.8rem">—</span>';
  return '<ul class="list-items '+cls+'">'+items.map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul>';
}
function esc(s){ return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCard(d, rank){
  const maxTotal = DRUGS[0].toplam;
  const dogru = d.dogru_cevap_sayisi;
  const sik = d.sik_sayisi;
  const top = d.toplam;
  const grup = getGroupTag(d);
  const o = d.ozellikler;

  const qStyleHtml = renderQStyle(d);

  return `<div class="drug-card" id="card-${rank}" data-drug="${esc(d.isim)}" onclick="toggleCard(${rank})">
    <div class="card-head">
      <div class="card-name">
        ${rank<=10?'<span class="rank-badge">#'+rank+'</span>':''}
        ${esc(d.isim)}
        <button class="star-btn ${starredDrugs.has(d.isim)?'starred':''}" onclick="toggleStarCard(${rank},event)" title="${starredDrugs.has(d.isim)?'Yıldızı kaldır':'Yıldızla'}">⭐</button>
      </div>
      <div class="card-counts">
        <div class="count-item"><span class="dot dot-green"></span><span class="count-label">Doğru cevap:</span> <span class="count-val" style="color:var(--green)">${dogru}</span></div>
        <div class="count-item"><span class="dot dot-orange"></span><span class="count-label">Şık:</span> <span class="count-val" style="color:var(--orange)">${sik}</span></div>
        <div class="count-item"><span class="count-label">Toplam:</span> <span class="count-val" style="color:var(--accent)">${top}</span></div>
      </div>
      <div class="bar-wrap"><div class="bar-inner" style="width:${pct(top,maxTotal)}%"></div></div>
      ${dogru>0?'<div class="bar-wrap" style="margin-top:3px"><div class="bar-inner bar-correct" style="width:'+pct(dogru,top)+'%"></div></div>':''}
      <div style="font-size:.65rem;color:var(--sub);margin-top:3px">${dogru>0?pct(dogru,top)+'% doğru cevap oranı':''}</div>
      <div class="card-tags"><span class="tag">${grup}</span>${dogru>0?'<span class="tag" style="background:#dcfce7;color:#15803d">Doğru Cevap Var</span>':''}</div>
    </div>
    <div class="card-detail">
      <div class="detail-section">
        <h3>⚙️ Etki Mekanizması</h3>
        <p class="mechanism-text">${esc(o.mekanizma||'—')}</p>
      </div>
      ${(o.endikasyon||[]).length>0?'<div class="detail-section"><h3>🩺 Endikasyonlar</h3>'+makeList(o.endikasyon,'success')+'</div>':''}
      ${(o.yan_etkiler||[]).length>0?'<div class="detail-section"><h3>⚠️ Yan Etkiler</h3>'+makeList(o.yan_etkiler,'danger')+'</div>':''}
      ${o.farmakokinetik?'<div class="detail-section"><h3>🔬 Farmakokinetik</h3><p class="pk-text">'+esc(o.farmakokinetik)+'</p></div>':''}
      ${qStyleHtml}
    </div>
  </div>`;
}

function render(){
  if(viewMode==='group'){ renderGrouped(); return; }
  openCard = null;
  const list = getFiltered();
  document.getElementById('result-count').textContent = list.length+' ilaç gösteriliyor';
  const grid = document.getElementById('grid');
  grid.className = 'grid';
  if(list.length===0){
    grid.innerHTML = '<div class="no-results"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Sonuç bulunamadı</p></div>';
    return;
  }
  grid.innerHTML = list.map((d,i)=>renderCard(d,i+1)).join('');
}

function toggleCard(rank){
  const card = document.getElementById('card-'+rank);
  if(!card) return;
  const wasOpen = card.classList.contains('open');
  if(openCard && openCard!==card) openCard.classList.remove('open');
  card.classList.toggle('open', !wasOpen);
  openCard = wasOpen ? null : card;
  if(!wasOpen) setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function setSort(mode){
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setFilter(mode){
  filterMode = mode;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ searchTerm=e.target.value.trim(); render(); }, 200);
});

function toggleTheme(){
  document.body.classList.toggle('dark');
  const btn = document.querySelector('.theme-btn');
  btn.textContent = document.body.classList.contains('dark') ? '☀️ Açık Tema' : '🌙 Koyu Tema';
}

// ── GRUPLU GÖRÜNÜM ──────────────────────────────────────────────
let viewMode = 'list';
let collapsedGroups = new Set();

const GROUP_INFO = {
  'Antiepileptik':    { icon: '⚡', accent: '#4f46e5', desc: 'Epilepsi ve nöbet bozukluklarında' },
  'Antiparkinson':    { icon: '🫧', accent: '#0891b2', desc: 'Parkinson hastalığı tedavisinde' },
  'Antidepresan':     { icon: '💜', accent: '#7c3aed', desc: 'Depresyon, anksiyete ve OKB tedavisinde' },
  'Antipsikotik':     { icon: '🔴', accent: '#dc2626', desc: 'Şizofreni ve psikotik bozukluklarda' },
  'NSAİİ':            { icon: '💊', accent: '#ea580c', desc: 'Ağrı, ateş ve inflamasyon tedavisinde' },
  'Opioid':           { icon: '🟠', accent: '#d97706', desc: 'Orta ve şiddetli ağrı yönetiminde' },
  'Migren':           { icon: '🤯', accent: '#be185d', desc: 'Migren atakları ve profilaksisinde' },
  'Kas Gevşetici':    { icon: '💪', accent: '#15803d', desc: 'Spastisite ve nöromüsküler hastalıklarda' },
  'Anestezik':        { icon: '😴', accent: '#0f766e', desc: 'Genel ve lokal anestezi uygulamalarında' },
  'Sedatif/Hipnotik': { icon: '💤', accent: '#6d28d9', desc: 'Anksiyete, insomnia ve sedasyon tedavisinde' },
  'Diğer':            { icon: '📋', accent: '#64748b', desc: 'Diğer farmakolojik gruplar' }
};

function renderGrouped(){
  openCard = null;
  const list = getFiltered();
  const grid = document.getElementById('grid');
  grid.className = 'grid grouped-view';

  if(list.length === 0){
    grid.innerHTML = '<div class="no-results"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Sonuç bulunamadı</p></div>';
    document.getElementById('result-count').textContent = '0 ilaç gösteriliyor';
    return;
  }

  // Grupları oluştur, global rank koru
  const groupMap = new Map();
  list.forEach((d, i) => {
    const g = getGroupTag(d);
    if(!groupMap.has(g)) groupMap.set(g, []);
    groupMap.get(g).push({ drug: d, rank: i + 1 });
  });

  // Gruplari toplam frekansa göre sırala
  const sorted = [...groupMap.entries()].sort((a, b) =>
    b[1].reduce((s,x)=>s+x.drug.toplam,0) - a[1].reduce((s,x)=>s+x.drug.toplam,0)
  );

  document.getElementById('result-count').textContent = list.length+' ilaç · '+sorted.length+' grup';

  grid.innerHTML = sorted.map(([groupName, items]) => {
    const info = GROUP_INFO[groupName] || { icon: '📋', accent: '#64748b', desc: '' };
    const totalFreq = items.reduce((s,x)=>s+x.drug.toplam, 0);
    const safeId = groupName.replace(/[\/\s]/g,'_');
    const isCollapsed = collapsedGroups.has(safeId);
    const cardsHtml = items.map(x=>renderCard(x.drug, x.rank)).join('');
    return `<div class="group-section${isCollapsed?' collapsed':''}" id="grp-${safeId}">
      <div class="group-header" onclick="toggleGroup('${safeId}')" style="border-left:4px solid ${info.accent}">
        <span class="group-icon">${info.icon}</span>
        <div class="group-info-txt">
          <span class="group-name">${groupName}</span>
          <span class="group-desc">${info.desc}</span>
        </div>
        <div class="group-badges">
          <span class="group-count-badge">${items.length} ilaç</span>
          <span class="group-freq-badge">${totalFreq} çıkış</span>
        </div>
        <span class="group-chev">⌄</span>
      </div>
      <div class="group-body">
        <div class="group-inner-grid">${cardsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleGroup(safeId){
  const section = document.getElementById('grp-'+safeId);
  if(!section) return;
  const collapsed = section.classList.toggle('collapsed');
  if(collapsed) collapsedGroups.add(safeId);
  else collapsedGroups.delete(safeId);
}

function setView(mode){
  viewMode = mode;
  document.getElementById('viewListBtn').classList.toggle('active', mode==='list');
  document.getElementById('viewGroupBtn').classList.toggle('active', mode==='group');
  // Sıralama butonları yalnızca liste modunda aktif
  document.querySelectorAll('.sort-btn:not(#viewListBtn):not(#viewGroupBtn)').forEach(b=>{
    b.style.opacity = mode==='group' ? '.4' : '';
    b.style.pointerEvents = mode==='group' ? 'none' : '';
  });
  render();
}

// ── VERSION CONTROL SYSTEM ──────────────────────────────────────
let starredDrugs = new Set(JSON.parse(localStorage.getItem('farma_starred') || '[]'));

function saveStarred(){
  localStorage.setItem('farma_starred', JSON.stringify([...starredDrugs]));
}

function toggleStarCard(rank, e){
  e.stopPropagation();
  const card = document.getElementById('card-' + rank);
  const name = card.dataset.drug;
  if(starredDrugs.has(name)) starredDrugs.delete(name);
  else starredDrugs.add(name);
  saveStarred();
  const btn = card.querySelector('.star-btn');
  const isStarred = starredDrugs.has(name);
  btn.classList.toggle('starred', isStarred);
  btn.title = isStarred ? 'Yıldızı kaldır' : 'Yıldızla';
  updateStarredBar();
}

function clearStarred(){
  starredDrugs.clear();
  saveStarred();
  render();
  updateStarredBar();
}

function updateStarredBar(){
  const bar = document.getElementById('starredBar');
  if(starredDrugs.size > 0){
    bar.classList.add('visible');
    bar.querySelector('.starred-count').textContent = starredDrugs.size + ' ilaç yıldızlandı';
  } else {
    bar.classList.remove('visible');
  }
}

const VCS = {
  KEY: 'farma_vcs_v1',
  getAll(){ return JSON.parse(localStorage.getItem(this.KEY) || '[]'); },
  save(msg){
    const all = this.getAll();
    const snap = {
      id: Date.now().toString(16),
      msg: msg || 'Anlık görünüm',
      date: new Date().toLocaleString('tr-TR'),
      ts: Date.now(),
      state: {
        sort: sortMode,
        filter: filterMode,
        search: searchTerm,
        starred: [...starredDrugs]
      }
    };
    all.unshift(snap);
    if(all.length > 30) all.pop();
    localStorage.setItem(this.KEY, JSON.stringify(all));
    return snap;
  },
  restore(id){
    const snap = this.getAll().find(s => s.id === id);
    if(!snap) return;
    sortMode = snap.state.sort;
    filterMode = snap.state.filter;
    searchTerm = snap.state.search || '';
    starredDrugs = new Set(snap.state.starred || []);
    saveStarred();
    document.getElementById('searchInput').value = searchTerm;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    const sb = document.querySelector('.sort-btn[onclick="setSort(\''+sortMode+'\')"]');
    if(sb) sb.classList.add('active');
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    const fb = document.querySelector('.filter-chip[onclick="setFilter(\''+filterMode+'\')"]');
    if(fb) fb.classList.add('active');
    render();
    updateStarredBar();
    closeVCS();
  },
  del(id){
    const all = this.getAll().filter(s => s.id !== id);
    localStorage.setItem(this.KEY, JSON.stringify(all));
    renderVCSList();
  }
};

function openVCS(){
  updateVCSCurrentState();
  renderVCSList();
  document.getElementById('vcsOverlay').classList.add('open');
  document.getElementById('vcsPanel').classList.add('open');
}

function closeVCS(){
  document.getElementById('vcsOverlay').classList.remove('open');
  document.getElementById('vcsPanel').classList.remove('open');
}

function updateVCSCurrentState(){
  const el = document.getElementById('vcsCurrentState');
  const sortLabel = {toplam:'Toplam',dogru:'Doğru Cevap',sik:'Şık',az:'Az Çıkan'}[sortMode] || sortMode;
  const filterLabel = {all:'Tümü',dogru5:'≥5 Doğru',cok:'≥4 Kez',hic:'Hiç Doğru Yok',yildiz:'Yıldızlananlar'}[filterMode] || filterMode;
  el.innerHTML = '<strong>Mevcut Durum</strong>'
    + '↓ ' + sortLabel
    + (filterMode!=='all' ? ' &nbsp;|&nbsp; 🔍 ' + filterLabel : '')
    + (searchTerm ? ' &nbsp;|&nbsp; 🔎 "' + esc(searchTerm) + '"' : '')
    + (starredDrugs.size > 0 ? ' &nbsp;|&nbsp; ⭐ ' + starredDrugs.size + ' yıldızlı' : '');
}

function vcsCommit(){
  const msg = document.getElementById('vcsMsg').value.trim();
  VCS.save(msg || 'Anlık görünüm kaydedildi');
  document.getElementById('vcsMsg').value = '';
  renderVCSList();
  const btn = document.getElementById('vcsSaveBtn');
  btn.textContent = '✓ Kaydedildi!';
  setTimeout(() => { btn.textContent = '💾 Kaydet'; }, 1800);
}

function renderVCSList(){
  const list = document.getElementById('vcsList');
  const all = VCS.getAll();
  if(all.length === 0){
    list.innerHTML = '<div class="vcs-empty">Henüz kaydedilmiş versiyon yok.<br><br>Mevcut sıralama, filtre ve yıldızlı ilaçları<br>kaydetmek için yukarıdaki alanı kullanın.</div>';
    return;
  }
  const sortLabel = {toplam:'↓ Toplam',dogru:'↓ Doğru Cevap',sik:'↓ Şık',az:'↑ Az Çıkan'};
  const filterLabel = {all:'Tümü',dogru5:'≥5 Doğru',cok:'≥4 Kez',hic:'Hiç Doğru Yok',yildiz:'Yıldızlananlar'};
  list.innerHTML = all.map(s => {
    const tags = [
      '<span class="vcs-meta-tag">' + (sortLabel[s.state.sort]||s.state.sort) + '</span>',
      s.state.filter!=='all' ? '<span class="vcs-meta-tag">🔍 '+(filterLabel[s.state.filter]||s.state.filter)+'</span>' : '',
      s.state.search ? '<span class="vcs-meta-tag">🔎 '+esc(s.state.search)+'</span>' : '',
      s.state.starred&&s.state.starred.length>0 ? '<span class="vcs-meta-tag">⭐ '+s.state.starred.length+' yıldızlı</span>' : ''
    ].filter(Boolean).join('');
    return '<div class="vcs-item">'
      + '<div class="vcs-item-head"><span class="vcs-item-msg">'+esc(s.msg)+'</span><span class="vcs-item-date">'+s.date+'</span></div>'
      + '<div class="vcs-item-meta">'+tags+'<span class="vcs-hash">#'+s.id+'</span></div>'
      + '<div class="vcs-item-actions">'
      + '<button class="vcs-restore-btn" onclick="VCS.restore(\''+s.id+'\')">↩ Geri Yükle</button>'
      + '<button class="vcs-del-btn" onclick="VCS.del(\''+s.id+'\')" title="Sil">🗑</button>'
      + '</div></div>';
  }).join('');
}

renderStats();
render();
updateStarredBar();
